apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sugananth2003/special-tribble-devops-Code
    targetRevision: main
    path: helm/retail-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: retail-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
